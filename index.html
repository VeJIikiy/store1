<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <title>The Kitchen 13 Menu</title>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222222);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #248b65);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 0;
            user-select: none;
        }

        .header {
            text-align: center;
            padding: 20px;
            background: var(--sec-bg);
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }

        .categories {
            display: flex;
            gap: 10px;
            padding: 10px;
            overflow-x: auto;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 10;
        }

        .categories::-webkit-scrollbar { display: none; }

        .cat-btn {
            background: var(--sec-bg);
            color: var(--text);
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            white-space: nowrap;
            cursor: pointer;
            font-weight: 500;
        }

        .cat-btn.active {
            background: var(--btn);
            color: var(--btn-text);
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 12px;
        }

        .card {
            background: var(--sec-bg);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            background: #eee;
        }

        .info {
            padding: 12px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .price {
            color: var(--btn);
            font-weight: 700;
            font-size: 15px;
            margin-bottom: 10px;
        }

        .buy-btn {
            background: var(--btn);
            color: var(--btn-text);
            border: none;
            border-radius: 10px;
            padding: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .buy-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">The Kitchen 13</h2>
    <div style="font-size:12px; color:var(--hint)">Bali, Indonesia</div>
</div>

<div class="categories" id="cat-bar">
    <button class="cat-btn active" onclick="filter('all', event)">All</button>
    <button class="cat-btn" onclick="filter('coffee', event)">Coffee</button>
    <button class="cat-btn" onclick="filter('bakery', event)">Bakery</button>
    <button class="cat-btn" onclick="filter('breakfast', event)">Breakfast</button>
    <button class="cat-btn" onclick="filter('mains', event)">Mains</button>
</div>

<div class="container" id="catalog"></div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    // Массив товаров (сюда добавляй новые позиции)
    const items = [
        { name: "Espresso", price: "25k", cat: "coffee", img: "https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=300" },
        { name: "Cappuccino", price: "35k", cat: "coffee", img: "https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=300" },
        { name: "Butter Croissant", price: "28k", cat: "bakery", img: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=300" },
        { name: "Pain au Chocolat", price: "32k", cat: "bakery", img: "https://images.unsplash.com/photo-1530610476181-d83430b64dcd?w=300" },
        { name: "Avocado Toast", price: "65k", cat: "breakfast", img: "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=300" },
        { name: "The 13 Breakfast", price: "85k", cat: "breakfast", img: "https://images.unsplash.com/photo-1496042399014-17f06bb9d820?w=300" },
        { name: "Nasi Goreng", price: "75k", cat: "mains", img: "https://images.unsplash.com/photo-1603133872878-684f208fb84b?w=300" }
    ];

    let cart = [];

    function render(category = 'all') {
        const root = document.getElementById('catalog');
        root.innerHTML = '';
        items.forEach(item => {
            if (category === 'all' || item.cat === category) {
                root.innerHTML += `
                    <div class="card">
                        <img src="${item.img}" alt="${item.name}">
                        <div class="info">
                            <div class="title">${item.name}</div>
                            <div class="price">${item.price}</div>
                            <button class="buy-btn" onclick="addToCart('${item.name}')">Add</button>
                        </div>
                    </div>`;
            }
        });
    }

    function filter(category, event) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        render(category);
    }

    function addToCart(name) {
        cart.push(name);
        tg.MainButton.setText("VIEW ORDER (" + cart.length + ")");
        tg.MainButton.show();
        tg.HapticFeedback.impactOccurred('light');
    }

    // Обработка нажатия на главную кнопку Telegram
    tg.onEvent('mainButtonClicked', function() {
        const orderText = cart.join(", ");
        tg.sendData("Order: " + orderText);
        tg.close();
    });

    render();
</script>
</body>
</html>
