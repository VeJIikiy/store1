<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #fff);
            --text: var(--tg-theme-text-color, #222);
            --hint: var(--tg-theme-hint-color, #999);
            --btn: var(--tg-theme-button-color, #248b65);
            --btn-text: var(--tg-theme-button-text-color, #fff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        .header { text-align: center; padding: 20px; background: var(--sec-bg); border-bottom: 1px solid #ddd; }
        
        .categories { display: flex; gap: 10px; padding: 10px; overflow-x: auto; background: var(--bg); sticky: top; }
        .cat-btn { background: var(--sec-bg); color: var(--text); border: none; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; }
        .cat-btn.active { background: var(--btn); color: var(--btn-text); }

        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: var(--sec-bg); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 120px; object-fit: cover; background: #eee; }
        .info { padding: 10px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .title { font-size: 14px; font-weight: bold; margin-bottom: 5px; }
        .price { color: var(--btn); font-weight: bold; margin-bottom: 8px; }
        .buy { background: var(--btn); color: var(--btn-text); border: none; border-radius: 8px; padding: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">The Kitchen 13</h2>
    <div style="font-size:12px; color:var(--hint)">Bali Menu</div>
</div>

<div class="categories" id="cat-bar">
    <button class="cat-btn active" onclick="filter('all')">All</button>
    <button class="cat-btn" onclick="filter('coffee')">Coffee</button>
    <button class="cat-btn" onclick="filter('bakery')">Bakery</button>
    <button class="cat-btn" onclick="filter('breakfast')">Breakfast</button>
</div>

<div class="container" id="catalog"></div>

<script>
    const items = [
        { name: "Espresso", price: "25k", cat: "coffee", img: "https://via.placeholder.com/300?text=Espresso" },
        { name: "Cappuccino", price: "35k", cat: "coffee", img: "https://via.placeholder.com/300?text=Cappuccino" },
        { name: "Butter Croissant", price: "28k", cat: "bakery", img: "https://via.placeholder.com/300?text=Croissant" },
        { name: "Pain au Chocolat", price: "32k", cat: "bakery", img: "https://via.placeholder.com/300?text=Pain" },
        { name: "Avocado Toast", price: "65k", cat: "breakfast", img: "https://via.placeholder.com/300?text=Avocado" },
        { name: "The 13 Breakfast", price: "85k", cat: "breakfast", img: "https://via.placeholder.com/300?text=Full+Breakfast" }
    ];

    function render(c = 'all') {
        const root = document.getElementById('catalog');
        root.innerHTML = '';
        items.forEach(i => {
            if (c === 'all' || i.cat === c) {
                root.innerHTML += `
                    <div class="card">
                        <img src="${i.img}">
                        <div class="info">
                            <div class="title">${i.name}</div>
                            <div class="price">${i.price}</div>
                            <button class="buy" onclick="buy('${i.name}')">Add</button>
                        </div>
                    </div>`;
            }
        });
    }

    function filter(c) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        render(c);
    }

    function buy(name) {
        let tg = window.Telegram.WebApp;
        tg.sendData("Order: " + name);
        tg.close();
    }

    render();
</script>
</body>
</html>
