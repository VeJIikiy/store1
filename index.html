<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222);
            --hint: var(--tg-theme-hint-color, #999);
            --btn: var(--tg-theme-button-color, #248b65);
            --btn-text: var(--tg-theme-button-text-color, #fff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; user-select: none; }
        .header { padding: 15px; text-align: center; background: var(--sec-bg); border-bottom: 1px solid rgba(0,0,0,0.1); }
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: var(--sec-bg); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card img { width: 100%; height: 120px; object-fit: cover; background: #eee; }
        .info { padding: 10px; flex-grow: 1; }
        .price { color: var(--btn); font-weight: bold; margin: 5px 0; }
        .add-btn { width: 100%; background: var(--btn); color: var(--btn-text); border: none; border-radius: 8px; padding: 8px; font-weight: 600; cursor: pointer; }
        
        #cart-screen { display: none; padding: 20px; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .total { font-size: 20px; font-weight: bold; text-align: right; margin-top: 20px; color: var(--btn); }
        .back-btn { background: var(--hint); color: #fff; border: none; border-radius: 8px; padding: 12px; width: 100%; margin-top: 20px; font-weight: 600; }
    </style>
</head>
<body>

<div id="menu-screen">
    <div class="header">
        <h2 style="margin:0">The Kitchen 13</h2>
        <div style="font-size:12px; color:var(--hint)">Bali, Indonesia</div>
    </div>
    <div class="container" id="catalog"></div>
</div>

<div id="cart-screen">
    <h2>Ваш заказ</h2>
    <div id="cart-list"></div>
    <div class="total" id="total-price">Итого: 0k</div>
    <button class="back-btn" onclick="toggleScreen('menu')">← Вернуться в меню</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const products = [
        { id: 1, name: "Espresso", price: 25, img: "https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=200" },
        { id: 2, name: "Cappuccino", price: 35, img: "https://images.unsplash.com/photo-1572442388796-11668a67e53d?w=200" },
        { id: 3, name: "Croissant", price: 28, img: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=200" },
        { id: 4, name: "Avocado Toast", price: 65, img: "https://images.unsplash.com/photo-1525351484163-7529414344d8?w=200" }
    ];

    let cart = [];

    function renderMenu() {
        const root = document.getElementById('catalog');
        root.innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.img}">
                <div class="info">
                    <div style="font-size:14px; font-weight:600">${p.name}</div>
                    <div class="price">${p.price}k</div>
                    <button class="add-btn" onclick="addToCart(${p.id})">Добавить</button>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const product = products.find(p => p.id === id);
        cart.push(product);
        tg.MainButton.setText(`ПОСМОТРЕТЬ ЗАКАЗ (${cart.length})`);
        tg.MainButton.show();
        tg.HapticFeedback.impactOccurred('light');
    }

    function toggleScreen(screen) {
        if (screen === 'cart') {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('cart-screen').style.display = 'block';
            renderCart();
            tg.MainButton.setText("ПОДТВЕРДИТЬ ЗАКАЗ");
        } else {
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('cart-screen').style.display = 'none';
            tg.MainButton.setText(`ПОСМОТРЕТЬ ЗАКАЗ (${cart.length})`);
        }
    }

    function renderCart() {
        const list = document.getElementById('cart-list');
        let total = 0;
        list.innerHTML = cart.map(item => {
            total += item.price;
            return `<div class="cart-item"><span>${item.name}</span><b>${item.price}k</b></div>`;
        }).join('');
        document.getElementById('total-price').innerText = `Итого: ${total}k`;
    }

    tg.onEvent('mainButtonClicked', function() {
        if (document.getElementById('menu-screen').style.display !== 'none') {
            toggleScreen('cart');
        } else {
            if (cart.length === 0) return;
            const orderStr = cart.map(i => i.name).join(", ");
            // ОТПРАВЛЯЕМ ДАННЫЕ БОТУ
            tg.sendData(orderStr);
            tg.close();
        }
    });

    renderMenu();
</script>
</body>
</html>
