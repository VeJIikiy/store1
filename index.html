<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); margin: 0; padding: 20px; }
        .item { background: var(--tg-theme-secondary-bg-color); border-radius: 15px; padding: 15px; margin-bottom: 20px; text-align: center; border: 1px solid rgba(0,0,0,0.1); }
        .item img { width: 100%; border-radius: 10px; max-width: 200px; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; border-radius: 10px; padding: 12px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px; }
        h2 { margin: 10px 0 5px 0; font-size: 1.2em; }
        .price { font-weight: bold; color: #248b65; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Кухонная Барахолка</h1>
    
    <div class="item">
        <img src="https://via.placeholder.com/150?text=Knife" alt="Нож">
        <h2>Профессиональный нож</h2>
        <div class="price">1500 руб.</div>
        <button onclick="buy('Нож')">Купить</button>
    </div>

    <div class="item">
        <img src="https://via.placeholder.com/150?text=Pan" alt="Сковорода">
        <h2>Сковорода чугунная</h2>
        <div class="price">2800 руб.</div>
        <button onclick="buy('Сковорода')">Купить</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function buy(name) {
            // Отправляем данные боту и закрываем окно
            tg.sendData("Заказ: " + name);
            tg.close();
        }
    </script>
</body>
</html>
