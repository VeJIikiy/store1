<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #222);
            --hint: var(--tg-theme-hint-color, #999);
            --btn: var(--tg-theme-button-color, #248b65);
            --btn-text: var(--tg-theme-button-text-color, #fff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        /* Шапка */
        .header { padding: 15px; text-align: center; background: var(--sec-bg); border-bottom: 1px solid #ddd; }
        
        /* Категории */
        .categories { display: flex; gap: 10px; padding: 10px; overflow-x: auto; sticky: top; background: var(--bg); }
        .cat-btn { background: var(--sec-bg); border: none; padding: 8px 15px; border-radius: 20px; white-space: nowrap; color: var(--text); }
        .cat-btn.active { background: var(--btn); color: var(--btn-text); }

        /* Сетка товаров */
        .container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: var(--sec-bg); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .info { padding: 10px; flex-grow: 1; }
        .price { color: var(--btn); font-weight: bold; }
        .add-btn { width: 100%; background: var(--btn); color: var(--btn-text); border: none; border-radius: 8px; padding: 8px; margin-top: 5px; }

        /* Экран корзины (скрыт по умолчанию) */
        #cart-screen { display: none; padding: 20px; }
        .cart-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .total { font-size: 20px; font-weight: bold; text-align: right; margin-top: 20px; }
        .back-btn { background: var(--hint); color: #fff; border: none; border-radius: 8px; padding: 10px; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

<div id="menu-screen">
    <div class="header">
        <h2 style="margin:0">The Kitchen 13</h2>
    </div>

    <div class="categories">
        <button class="cat-btn active" onclick="filter('all')">All</button>
        <button class="cat-btn" onclick="filter('coffee')">Coffee</button>
        <button class="cat-btn" onclick="filter('bakery')">Bakery</button>
    </div>

    <div class="container" id="catalog"></div>
</div>

<div id="cart-screen">
    <h2>Your Order</h2>
    <div id="cart-list"></div>
    <div class="total" id="total-price">Total: 0k</div>
    <button class="back-btn" onclick="toggleScreen('menu')">← Back to Menu</button>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    const products = [
        { id: 1, name: "Espresso", price: 25, cat: "coffee", img: "https://via.placeholder.com/150?text=Coffee" },
        { id: 2, name: "Croissant", price: 28, cat: "bakery", img: "https://via.placeholder.com/150?text=Bread" },
        { id: 3, name: "Cappuccino", price: 35, cat: "coffee", img: "https://via.placeholder.com/150?text=Latte" }
    ];

    let cart = [];

    function render() {
        const cat = document.getElementById('catalog');
        cat.innerHTML = '';
        products.forEach(p => {
            cat.innerHTML += `
                <div class="card">
                    <img src="${p.img}">
                    <div class="info">
                        <div><b>${p.name}</b></div>
                        <div class="price">${p.price}k</div>
                        <button class="add-btn" onclick="addToCart(${p.id})">Add</button>
                    </div>
                </div>`;
        });
    }

    function addToCart(id) {
        const item = products.find(p => p.id === id);
        cart.push(item);
        tg.MainButton.setText(`VIEW ORDER (${cart.length})`);
        tg.MainButton.show();
    }

    function toggleScreen(screen) {
        if (screen === 'cart') {
            document.getElementById('menu-screen').style.display = 'none';
            document.getElementById('cart-screen').style.display = 'block';
            showCart();
            tg.MainButton.setText("CONFIRM ORDER");
        } else {
            document.getElementById('menu-screen').style.display = 'block';
            document.getElementById('cart-screen').style.display = 'none';
            tg.MainButton.setText(`VIEW ORDER (${cart.length})`);
        }
    }

    function showCart() {
        const list = document.getElementById('cart-list');
        list.innerHTML = '';
        let total = 0;
        cart.forEach(item => {
            list.innerHTML += `<div class="cart-item"><span>${item.name}</span><b>${item.price}k</b></div>`;
            total += item.price;
        });
        document.getElementById('total-price').innerText = `Total: ${total}k`;
    }

    // Слушаем главную кнопку Telegram
    tg.onEvent('mainButtonClicked', function() {
        if (document.getElementById('menu-screen').style.display !== 'none') {
            toggleScreen('cart');
        } else {
            // Если мы уже в корзине — отправляем боту
            const orderSummary = cart.map(i => i.name).join(", ");
            tg.sendData("Order: " + orderSummary);
            tg.close();
        }
    });

    render();
</script>
</body>
</html>
